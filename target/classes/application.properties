spring.application.name=javaavaliacao
spring.servlet.multipart.max-file-size=10MB

spring.servlet.multipart.max-request-size=10MB

# Configura��o do banco (usando o Docker que configuramos antes)

spring.datasource.url=jdbc:mysql://localhost:3306/documentsDb

spring.datasource.hikari.connection-timeout=60000

